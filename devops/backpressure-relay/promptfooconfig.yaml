description: backpressure-relay llm-as-judge gate
prompts:
  - file://prompt.md
providers:
  - openai:gpt-4o-mini
tests:
  - vars:
      cenario_relay: |
        Relay: throughput sustentado 180k msgs/s; pico observado 320k msgs/s por 25min; retencao atual 4h; consumidores Forge e Sentinel.
        Restricoes: Sentinel nao pode atrasar mais que 60s; Forge pode atrasar ate 15min; orcamento do trimestre 8% acima do previsto; perda de telemetry e inaceitavel.
        Alternativas em avaliacao: prioridade ao Sentinel, fila separada para reprocessamento, dividir Relay por cliente, autoscaling de consumidores.
    assert:
      - type: regex
        value: "(DECIS[AÃ]O RECOMENDADA:)"
      - type: regex
        value: "(RESTRI[CÇ][OÕ]ES QUE GOVERNAM A DECIS[AÃ]O:)"
      - type: regex
        value: "(COMPARA[CÇ][AÃ]O DE ALTERNATIVAS:)"
      - type: regex
        value: "(ROLLOUT PROPOSTO:)"
      - type: regex
        value: "(DESCARTES:)"
      - type: regex
        value: "(M[EÉ]TRICAS DE SUCESSO:|METRICAS DE SUCESSO:)"
      - type: not-contains
        value: "```"
      - type: latency
        threshold: 20000
      - type: cost
        threshold: 0.01
