description: migracao-forge-event-driven elo 2 strategy gate
prompts:
  - file://migracao-forge-event-driven/elo-2-estrategia/prompt.md
providers:
  - openai:gpt-4o-mini
tests:
  - vars:
      diagnostico_forge: |
        Forge hoje roda em batch a cada 60min via job forge-batch-ingest. Cada execucao passa por 14 etapas Spark e leva cerca de 40min, gravando tabelas horarias no warehouse. A fragilidade principal e o acoplamento temporal: se um lote falha ou atrasa, o volume seguinte acumula e amplia a pressao operacional. Sentinel, Cerebro e billing dependem dessas tabelas particionadas por hora, entao a compatibilidade de contrato e um invariante.
        Falta medir volume real por janela, taxa de late events e custo de reprocessamento.
        Falta confirmar quais consumidores conseguem ler simultaneamente batch e event-driven.
    assert:
      - type: llm-rubric
        value: |
          A resposta deve propor migracao incremental, sem big-bang, com convivencia entre batch e event-driven. Precisa explicitar pontos de reversao e nao pode reabrir o diagnostico inteiro nem virar plano executavel prematuro.
      - type: latency
        threshold: 5000
      - type: cost
        threshold: 0.01
