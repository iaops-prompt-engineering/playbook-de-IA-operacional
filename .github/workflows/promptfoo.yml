name: Promptfoo Evaluation

on:
  pull_request:
    paths:
      - "devops/**"
      - ".github/workflows/promptfoo.yml"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "devops/**"
      - ".github/workflows/promptfoo.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  evaluate:
    name: ${{ matrix.prompt }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        prompt:
          - devops/triagem-de-pods/promptfooconfig.yaml
          - devops/nota-de-triagem/promptfooconfig.yaml
          - devops/networkpolicy-sentinel/promptfooconfig.yaml
          - devops/causa-raiz/promptfooconfig.yaml
          - devops/backpressure-relay/promptfooconfig.yaml
          - devops/migracao-forge-event-driven/promptfooconfig.yaml
          - devops/migracao-forge-event-driven/elo-2-estrategia/promptfooconfig.yaml
          - devops/migracao-forge-event-driven/elo-3-plano-reversivel/promptfooconfig.yaml

    env:
      PROMPTFOO_CONFIG_DIR: ${{ github.workspace }}/.promptfoo-home
      PROMPTFOO_CACHE_PATH: ~/.cache/promptfoo
      PROMPTFOO_DISABLE_TELEMETRY: "true"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache promptfoo evaluations
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/promptfoo
            .promptfoo-home
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('devops/**/prompt.md', 'devops/**/promptfooconfig.yaml', 'package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-${{ hashFiles('devops/**/prompt.md', 'devops/**/promptfooconfig.yaml', 'package-lock.json') }}-
            ${{ runner.os }}-promptfoo-

      - name: Run promptfoo evaluation
        uses: promptfoo/promptfoo-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          config: ${{ matrix.prompt }}
          cache-path: ~/.cache/promptfoo
          fail-on-threshold: 100
          max-concurrency: 2
          no-share: true
